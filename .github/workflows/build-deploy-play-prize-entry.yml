name: Build and Deploy Service Play Prize Entry SPA

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      service:
        required: true
        type: string
      folder:
        required: true
        type: string
      always-override-limit:
        required: false
        type: string
      logout-return-url:
        required: true
        type: string
      auth-callback:
        required: true
        type: string

# OIDC: assume the geekway-<env>-github-deploy role; no static AWS keys.
permissions:
  id-token: write
  contents: read

env:
  ROLE_TO_ASSUME: ${{ inputs.environment == 'nonprod' && secrets.NONPROD_ROLE_ARN || secrets.PROD_ROLE_ARN }}
  # Only the API origin is baked into the bundle now; the org/{id}/con/{id} path
  # segment is read from the page URL at runtime (one build serves all conventions).
  API_HOST: ${{ inputs.environment == 'nonprod' && secrets.API_HOST_NONPROD || secrets.API_HOST }}
  # SPA_BUCKET and CF_DISTRIBUTION_ID are resolved at runtime from the network
  # stack's SpaBucketName / DistributionId outputs (see step below) — both are
  # account-scoped, so they're read from the stack rather than from secrets.
  SPA_PREFIX: legacy/playandwin

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Real GitHub Environment (configure required reviewers on `prod`). The gate
    # lives here, in the called workflow, because this is where the deploy role is
    # assumed; it also scopes the OIDC sub to `…:environment:<env>`, which the role
    # trust now requires. NOTE: the orchestrator fans out to three called
    # workflows, so a prod run prompts for approval three times — approve each, or
    # consolidate the three deploys into one job if that's noisy.
    environment: ${{ inputs.environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-region: ${{ secrets.AWS_REGION }}
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        role-duration-seconds: 1200

    - name: Resolve SPA bucket + CloudFront distribution from CDK stack outputs
      run: |
        SPA_BUCKET=$(aws cloudformation describe-stacks \
          --stack-name "geekway-${{ inputs.environment }}-network" \
          --query "Stacks[0].Outputs[?OutputKey=='SpaBucketName'].OutputValue" \
          --output text)
        echo "SPA_BUCKET=$SPA_BUCKET" >> "$GITHUB_ENV"
        CF_DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
          --stack-name "geekway-${{ inputs.environment }}-network" \
          --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
          --output text)
        echo "CF_DISTRIBUTION_ID=$CF_DISTRIBUTION_ID" >> "$GITHUB_ENV"

    - name: Build SPA
      working-directory: ${{ inputs.folder }}
      env:
        API_IDENTIFIER: ${{ secrets.API_IDENTIFIER }}
        AUTH_CALLBACK: ${{ inputs.auth-callback }}
        AUTH_CLIENT_ID: ${{ secrets.AUTH_PLAY_PRIZE_ENTRY_CLIENT_ID }}
        AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
        LOGOUT_RETURN_URL: ${{ inputs.logout-return-url }}
        WEBPACK_MODE: ${{ secrets.WEBPACK_MODE }}
      run: |
        npm install
        npm run build:prod

    - name: Sync to S3 and invalidate CloudFront
      working-directory: ${{ inputs.folder }}
      run: |
        aws s3 sync dist/ "s3://${SPA_BUCKET}/${SPA_PREFIX}/" --delete
        aws cloudfront create-invalidation \
          --distribution-id "$CF_DISTRIBUTION_ID" \
          --paths "/${SPA_PREFIX}/*"
