name: Build and Deploy Service Play Prize Entry SPA

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      service:
        required: true
        type: string
      folder:
        required: true
        type: string
      always-override-limit:
        required: false
        type: string
      # play-prize-entry has no logout flow, so this is optional and unused.
      logout-return-url:
        required: false
        type: string
      auth-callback:
        required: true
        type: string

# OIDC: assume the geekway-<env>-github-deploy role; no static AWS keys.
permissions:
  id-token: write
  contents: read

env:
  ROLE_TO_ASSUME: ${{ inputs.environment == 'nonprod' && secrets.NONPROD_ROLE_ARN || secrets.PROD_ROLE_ARN }}
  API_URL: ${{ inputs.environment == 'nonprod' && secrets.API_URL_NONPROD || secrets.API_URL }}
  SPA_BUCKET: geekway-${{ inputs.environment }}-spa
  SPA_PREFIX: playandwin
  CF_DISTRIBUTION_ID: ${{ inputs.environment == 'nonprod' && secrets.CF_DISTRIBUTION_ID_NONPROD || secrets.CF_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ secrets.AWS_REGION }}
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        role-duration-seconds: 1200

    - name: Build SPA
      working-directory: ${{ inputs.folder }}
      # play-prize-entry's EnvironmentPlugin requires only these (no logout url).
      env:
        API_IDENTIFIER: ${{ secrets.API_IDENTIFIER }}
        AUTH_CALLBACK: ${{ inputs.auth-callback }}
        AUTH_CLIENT_ID: ${{ secrets.AUTH_PLAY_PRIZE_ENTRY_CLIENT_ID }}
        AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
        WEBPACK_MODE: ${{ secrets.WEBPACK_MODE }}
      run: |
        npm install
        npm run build:prod

    - name: Sync to S3 and invalidate CloudFront
      working-directory: ${{ inputs.folder }}
      run: |
        aws s3 sync dist/ "s3://${SPA_BUCKET}/${SPA_PREFIX}/" --delete
        aws cloudfront create-invalidation \
          --distribution-id "$CF_DISTRIBUTION_ID" \
          --paths "/${SPA_PREFIX}/*"
